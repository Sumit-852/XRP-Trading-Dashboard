name: XRP Trading Agent (5-min)

on:
  workflow_dispatch:

concurrency:
  group: xrp-trader
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout dashboard (public)
        uses: actions/checkout@v4

      - name: Checkout model (private)
        uses: actions/checkout@v4
        with:
          repository: Sumit-852/siemens-energy-trading
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: model

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Prepare data + run model
        working-directory: model
        run: |
          # Use the full 157K-bar CSV from the dashboard repo
          cp "$GITHUB_WORKSPACE/xrp_eur_5min.csv" .
          echo "Loaded CSV ($(wc -l < xrp_eur_5min.csv) rows)"

          # Copy dashboard state from public repo
          for f in xrp_dashboard_state.json xrp_news_sentiment.json; do
            if [ -f "$GITHUB_WORKSPACE/$f" ]; then
              cp "$GITHUB_WORKSPACE/$f" .
            fi
          done

          # Run the trader (appends ~1 new bar from Binance)
          python xrp_live_trader.py --retrain

      - name: Save results
        run: |
          # Copy outputs to public repo root
          cp model/xrp_live_signal.json . 2>/dev/null || true
          cp model/xrp_dashboard_state.json . 2>/dev/null || true
          cp model/xrp_news_sentiment.json . 2>/dev/null || true
          cp model/xrp_model_state.json . 2>/dev/null || true
          cp model/xrp_trade_feedback.json . 2>/dev/null || true

          # Update the master CSV with new bars (keeps it growing)
          cp model/xrp_eur_5min.csv . 2>/dev/null || true

      - name: Commit results
        run: |
          git config user.name "XRP Trading Bot"
          git config user.email "bot@github-actions"
          git add *.json xrp_eur_5min.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SIGNAL=$(python -c "
          import json
          try:
              d = json.load(open('xrp_live_signal.json'))
              s = d['signal']
              n = s.get('news', {})
              print(f\"{s['action']} | Score:{s['hybrid_score']} | {s['xgb_pred']} ({s['xgb_prob']:.1%}) | News:{n.get('sentiment','?')}\")
          except:
              print('?')
          " 2>/dev/null || echo "?")

            DASH=$(python -c "
          import json
          try:
              d = json.load(open('xrp_dashboard_state.json'))
              sells = [t for t in d['trades'] if t['action'] == 'SELL']
              wins = [t for t in sells if t.get('pnl_pct', 0) > 0]
              pv = d['capital'] + d['xrp_held'] * d.get('entry_price', 0)
              print(f\"EUR {pv:,.0f} | W:{len(wins)} L:{len(sells)-len(wins)}\")
          except:
              print('?')
          " 2>/dev/null || echo "?")

            git commit -m "XRP $(date -u '+%m-%d %H:%M') | ${SIGNAL} | ${DASH}"
            git push
          fi
